<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Learning Product Discovery Lab</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main>
    <header class="app-header">
      <div>
        <p class="eyebrow">Interactive video learning SaaS</p>
        <h1>Video Learning Product Discovery Lab</h1>
        <p class="lede">A product management artifact for turning educator research, usage signals, support friction, and launch risks into a roadmap decision and PRD handoff.</p>
      </div>
      <div class="decision-card" aria-live="polite">
        <span>Recommended move</span>
        <strong id="recommendedMove">Loading</strong>
      </div>
    </header>

    <section class="metric-strip" id="metricStrip" aria-label="Summary metrics"></section>

    <nav class="tabs" aria-label="Artifact surfaces">
      <button class="tab active" type="button" data-view="cockpit">Cockpit</button>
      <button class="tab" type="button" data-view="evidence">Evidence</button>
      <button class="tab" type="button" data-view="prd">PRD</button>
      <button class="tab" type="button" data-view="launch">Launch</button>
    </nav>

    <section id="view" class="surface" aria-live="polite"></section>
  </main>
  <script src="src/app.js"></script>
</body>
</html>
